overrides:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vitest: 4.1.10
# React may discard a Transitioner render, but 1.170.18 publishes that render's setter to the router.
# The app cannot make a dependency-owned render-time write safe; remove this patch when upstream installs
# startTransition only from a committed effect.
patchedDependencies:
  "@tanstack/react-router@1.170.18": patches/@tanstack__react-router@1.170.18.patch

allowBuilds:
  "@google/genai": false
  msgpackr-extract: false
  protobufjs: false

minimumReleaseAgeExclude:
  - "@yansircc/effect-scan"
